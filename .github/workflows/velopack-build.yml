name: Velopack Build

on:
    workflow_call:
        inputs:
            channel:
                required: true
                type: string
            version:
                required: true
                type: string
            tag:
                required: true
                type: string
            prerelease:
                required: true
                type: string
            target-commitish:
                required: true
                type: string

permissions:
    contents: write
    deployments: write

jobs:
    build-windows:
        name: Build Windows Velopack release
        runs-on: windows-latest
        environment: release
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ inputs.target-commitish }}
                  fetch-depth: 0

            - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

            - name: Install .NET SDK
              uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
              with:
                  dotnet-version: 8.0.x

            - name: Rust cache
              uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
              with:
                  workspaces: apps/desktop/src-tauri -> target

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate checked-in version policy
              working-directory: apps/desktop
              run: node scripts/ci/version-policy-check.mjs --skip-tag

            - name: Set release version
              working-directory: apps/desktop
              run: node scripts/ci/set-release-version.mjs "${{ inputs.version }}"

            - name: Validate release version policy
              working-directory: apps/desktop
              env:
                  GITHUB_REF_TYPE: tag
                  GITHUB_REF_NAME: ${{ inputs.tag }}
              run: node scripts/ci/version-policy-check.mjs

            - name: Resolve product release config
              id: product
              shell: pwsh
              run: |
                  $product = Get-Content -LiteralPath 'apps/desktop/product.json' -Raw | ConvertFrom-Json

                  function Add-GitHubEnv([string] $Name, [string] $Value) {
                      if ([string]::IsNullOrWhiteSpace($Value)) {
                          throw "$Name is missing from apps/desktop/product.json"
                      }
                      Add-Content -LiteralPath $env:GITHUB_ENV -Value "$Name=$Value" -Encoding UTF8
                  }

                  function Add-GitHubOutput([string] $Name, [string] $Value) {
                      if ([string]::IsNullOrWhiteSpace($Value)) {
                          throw "$Name is missing from apps/desktop/product.json"
                      }
                      Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "$Name=$Value" -Encoding UTF8
                  }

                  Add-GitHubEnv 'PRODUCT_DISPLAY_NAME' $product.displayName
                  Add-GitHubEnv 'PRODUCT_REPOSITORY_URL' $product.repository.url
                  Add-GitHubEnv 'VELOPACK_PACK_ID' $product.identifier
                  Add-GitHubEnv 'VELOPACK_PACK_TITLE' $product.displayName
                  Add-GitHubEnv 'VELOPACK_MAIN_EXE' $product.packaging.mainExe
                  Add-GitHubEnv 'CLOUDFLARE_PAGES_PROJECT_NAME' $product.services.updates.deployment.projectName
                  Add-GitHubEnv 'CLOUDFLARE_PAGES_BRANCH' $product.services.updates.deployment.branch
                  Add-GitHubOutput 'cloudflare_pages_project_name' $product.services.updates.deployment.projectName
                  Add-GitHubOutput 'cloudflare_pages_branch' $product.services.updates.deployment.branch

                  if ($null -eq $product.services.updates.channels.PSObject.Properties[$env:INPUT_CHANNEL]) {
                      throw "Update channel $env:INPUT_CHANNEL is missing from apps/desktop/product.json"
                  }
                  Add-GitHubEnv 'RELEASE_NAME' "$($product.displayName) v$env:INPUT_VERSION"
              env:
                  INPUT_CHANNEL: ${{ inputs.channel }}
                  INPUT_VERSION: ${{ inputs.version }}

            - name: Install Velopack CLI
              run: dotnet tool install --global vpk

            - name: Build Tauri executable
              working-directory: apps/desktop
              run: pnpm tauri build --no-bundle --ci

            - name: Stage Velopack input directory
              shell: pwsh
              run: |
                  $stage = Join-Path $env:RUNNER_TEMP 'touchai-velopack-stage'
                  if (Test-Path $stage) {
                      Remove-Item -LiteralPath $stage -Recurse -Force
                  }
                  New-Item -ItemType Directory -Force -Path $stage | Out-Null
                  $mainExePath = Join-Path 'apps/desktop/src-tauri/target/release' $env:VELOPACK_MAIN_EXE
                  Copy-Item -LiteralPath $mainExePath -Destination $stage
                  "VELOPACK_STAGE=$stage" >> $env:GITHUB_ENV

            - name: Prepare Velopack release directory
              shell: pwsh
              run: |
                  $release = Join-Path $env:RUNNER_TEMP 'touchai-velopack-release'
                  if (Test-Path $release) {
                      Remove-Item -LiteralPath $release -Recurse -Force
                  }
                  New-Item -ItemType Directory -Force -Path $release | Out-Null
                  "VELOPACK_RELEASE=$release" >> $env:GITHUB_ENV

            - name: Prepare release notes
              shell: pwsh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  RELEASE_TAG: ${{ inputs.tag }}
                  RELEASE_CHANNEL: ${{ inputs.channel }}
                  RELEASE_VERSION: ${{ inputs.version }}
                  TARGET_COMMITISH: ${{ inputs.target-commitish }}
              run: |
                  $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
                  $body = ''

                  try {
                      $body = gh release view "$env:RELEASE_TAG" --json body -q ".body" 2>$null
                      if ($LASTEXITCODE -ne 0) {
                          $body = ''
                      }
                  } catch {
                      $body = ''
                  }

                  if ([string]::IsNullOrWhiteSpace($body)) {
                      try {
                          $body = gh api "repos/$env:GITHUB_REPOSITORY/releases/generate-notes" `
                            -f "tag_name=$env:RELEASE_TAG" `
                            -f "target_commitish=$env:TARGET_COMMITISH" `
                            --jq ".body" 2>$null
                          if ($LASTEXITCODE -ne 0) {
                              $body = ''
                          }
                      } catch {
                          $body = ''
                      }
                  }

                  if ([string]::IsNullOrWhiteSpace($body)) {
                      $body = "## $env:RELEASE_NAME`n`nChannel: $env:RELEASE_CHANNEL`nVersion: $env:RELEASE_VERSION"
                  }

                  Set-Content -LiteralPath $notesPath -Value $body -Encoding UTF8
                  "RELEASE_NOTES_PATH=$notesPath" >> $env:GITHUB_ENV

            - name: Download previous Velopack release assets
              continue-on-error: true
              shell: pwsh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  vpk download github `
                    --repoUrl "$env:PRODUCT_REPOSITORY_URL" `
                    --token "$env:GITHUB_TOKEN" `
                    --channel "${{ inputs.channel }}" `
                    --pre "${{ inputs.prerelease }}" `
                    --outputDir "$env:VELOPACK_RELEASE"

            - name: Pack Velopack release
              shell: pwsh
              run: |
                  vpk pack `
                    --packId "$env:VELOPACK_PACK_ID" `
                    --packTitle "$env:VELOPACK_PACK_TITLE" `
                    --packVersion "${{ inputs.version }}" `
                    --packDir "$env:VELOPACK_STAGE" `
                    --mainExe "$env:VELOPACK_MAIN_EXE" `
                    --channel "${{ inputs.channel }}" `
                    --releaseNotes "$env:RELEASE_NOTES_PATH" `
                    --outputDir "$env:VELOPACK_RELEASE"

            - name: Normalize Velopack release asset names
              working-directory: apps/desktop
              run: node scripts/ci/normalize-velopack-release-assets.mjs "$env:VELOPACK_RELEASE" "${{ inputs.channel }}" "${{ inputs.version }}"

            - name: Publish Velopack release assets
              shell: pwsh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  vpk upload github `
                    --repoUrl "$env:PRODUCT_REPOSITORY_URL" `
                    --token "$env:GITHUB_TOKEN" `
                    --releaseName "$env:RELEASE_NAME" `
                    --tag "${{ inputs.tag }}" `
                    --targetCommitish "${{ inputs.target-commitish }}" `
                    --channel "${{ inputs.channel }}" `
                    --pre "${{ inputs.prerelease }}" `
                    --outputDir "$env:VELOPACK_RELEASE" `
                    --merge True `
                    --publish True

            - name: Sync GitHub release notes
              shell: pwsh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  RELEASE_TAG: ${{ inputs.tag }}
              run: |
                  gh release edit "$env:RELEASE_TAG" `
                    --title "$env:RELEASE_NAME" `
                    --notes-file "$env:RELEASE_NOTES_PATH"

            - name: Build update channel JSON
              working-directory: apps/desktop
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  node scripts/ci/build-update-channels.mjs "$env:RUNNER_TEMP/touchai-update-dist" `
                    --github-repository "$env:GITHUB_REPOSITORY" `
                    --channel "${{ inputs.channel }}" `
                    --version "${{ inputs.version }}" `
                    --tag "${{ inputs.tag }}" `
                    --prerelease "${{ inputs.prerelease }}" `
                    --release-notes-file "$env:RELEASE_NOTES_PATH" `
                    --release-dir "$env:VELOPACK_RELEASE"

            - name: Upload update channel JSON artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: touchai-update-channels
                  path: ${{ runner.temp }}/touchai-update-dist
                  if-no-files-found: error

            - name: Deploy update channel JSON to Cloudflare Pages
              shell: pwsh
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ steps.product.outputs.cloudflare_pages_project_name }}
                  CLOUDFLARE_PAGES_BRANCH: ${{ steps.product.outputs.cloudflare_pages_branch }}
              run: |
                  $updateDist = Join-Path $env:RUNNER_TEMP 'touchai-update-dist'
                  pnpm dlx wrangler@3.90.0 pages deploy "$updateDist" `
                    --project-name="$env:CLOUDFLARE_PAGES_PROJECT_NAME" `
                    --branch="$env:CLOUDFLARE_PAGES_BRANCH"

            - name: Upload Velopack diagnostics artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: touchai-velopack-windows-${{ inputs.channel }}-${{ inputs.version }}
                  path: ${{ env.VELOPACK_RELEASE }}
                  if-no-files-found: error
