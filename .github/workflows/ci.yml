name: CI

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read
    pull-requests: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Classify PR changes
        runs-on: ubuntu-latest
        outputs:
            docs_only: ${{ steps.classify.outputs.docs_only }}
        steps:
            - id: classify
              name: Detect docs-only pull requests
              uses: actions/github-script@v9
              with:
                  script: |
                      if (context.eventName !== 'pull_request' && context.eventName !== 'push') {
                        core.setOutput('docs_only', 'false');
                        return;
                      }

                      const docsOnlyPatterns = [
                        /^docs\//,
                        /^[^/]+\.md$/,
                        /^COPYING$/,
                        /^\.github\/ISSUE_TEMPLATE\//,
                        /^\.github\/dependabot\.yml$/,
                        /^\.github\/labeler\.yml$/,
                        /^\.github\/labels\.yml$/,
                        /^\.github\/pull_request_template\.md$/,
                        /^CLAUDE\.md$/,
                        /^CODE_OF_CONDUCT\.md$/,
                        /^CONTRIBUTING\.md$/,
                        /^README\.en\.md$/,
                        /^README\.md$/,
                        /^SECURITY\.md$/,
                        /^SUPPORT\.md$/,
                      ];

                      let files = [];

                      if (context.eventName === 'pull_request') {
                        files = await github.paginate(github.rest.pulls.listFiles, {
                          ...context.repo,
                          pull_number: context.issue.number,
                          per_page: 100,
                        });
                      } else if (context.eventName === 'push') {
                        const before = context.payload.before;
                        const after = context.payload.after;

                        if (!before || !after || /^0+$/.test(before)) {
                          core.setOutput('docs_only', 'false');
                          return;
                        }

                        const comparison = await github.rest.repos.compareCommits({
                          ...context.repo,
                          base: before,
                          head: after,
                        });

                        files = comparison.data.files ?? [];

                        // GitHub truncates compareCommits file lists at 300 entries. Fall back to full CI when unsure.
                        if (files.length >= 300) {
                          core.setOutput('docs_only', 'false');
                          return;
                        }
                      }

                      const docsOnly =
                        files.length > 0 &&
                        files.every((file) => docsOnlyPatterns.some((pattern) => pattern.test(file.filename)));

                      core.setOutput('docs_only', docsOnly ? 'true' : 'false');

            - name: Report classification
              run: echo "docs_only=${{ steps.classify.outputs.docs_only }}"

    conventional-commits:
        name: Conventional Commits
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate pull request title
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
              run: |
                  printf '%s\n' "$PR_TITLE" | pnpm exec commitlint --verbose

            - name: Validate commit messages
              run: |
                  pnpm exec commitlint \
                    --from "${{ github.event.pull_request.base.sha }}" \
                    --to "${{ github.event.pull_request.head.sha }}" \
                    --verbose

    dependency-review:
        name: Dependency Review
        if: github.event_name == 'pull_request'
        needs: changes
        runs-on: ubuntu-latest
        steps:
            - name: Skip dependency review for docs-only PRs
              if: needs.changes.outputs.docs_only == 'true'
              run: echo 'Dependency review is not required for docs-only pull requests.'

            - name: Dependency review
              if: needs.changes.outputs.docs_only != 'true'
              uses: actions/dependency-review-action@v4

    checks:
        name: Checks
        needs: changes
        runs-on: ubuntu-latest
        steps:
            - name: Skip heavy checks for docs-only PRs
              if: needs.changes.outputs.docs_only == 'true'
              run: echo 'Heavy CI checks are skipped for docs-only changes.'

            - uses: actions/checkout@v4
              if: needs.changes.outputs.docs_only != 'true'

            - uses: pnpm/action-setup@v6
              if: needs.changes.outputs.docs_only != 'true'

            - uses: actions/setup-node@v6
              if: needs.changes.outputs.docs_only != 'true'
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install Linux system dependencies
              if: needs.changes.outputs.docs_only != 'true'
              run: |
                  sudo apt update
                  sudo apt install -y \
                    build-essential \
                    curl \
                    file \
                    libayatana-appindicator3-dev \
                    libglib2.0-dev \
                    librsvg2-dev \
                    libssl-dev \
                    libwebkit2gtk-4.1-dev \
                    libxdo-dev \
                    pkg-config \
                    wget

            - name: Install Rust stable
              if: needs.changes.outputs.docs_only != 'true'
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              if: needs.changes.outputs.docs_only != 'true'
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Install dependencies
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm install --frozen-lockfile

            - name: Type check
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm type:check

            - name: Lint
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm lint:check

            - name: Format check
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm format:check

            - name: Run tests
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm test:run

            - name: Check Rust formatting
              if: needs.changes.outputs.docs_only != 'true'
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

            - name: Check Rust targets
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm check:rust

    build-windows:
        name: Build (Windows)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.docs_only != 'true'
        needs: checks
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Tauri app
              uses: tauri-apps/tauri-action@v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload installers
              uses: actions/upload-artifact@v4
              with:
                  name: touchai-installers-windows
                  path: |
                      src-tauri/target/release/bundle/nsis/*.exe
                      src-tauri/target/release/bundle/msi/*.msi
                  if-no-files-found: warn

            - name: Upload portable
              uses: actions/upload-artifact@v4
              with:
                  name: touchai-portable-windows
                  path: src-tauri/target/release/TouchAI.exe
                  if-no-files-found: warn
