name: CI

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read
    pull-requests: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Classify PR changes
        runs-on: ubuntu-latest
        outputs:
            docs_only: ${{ steps.classify.outputs.docs_only }}
        steps:
            - id: classify
              name: Detect docs-only pull requests
              uses: actions/github-script@v9
              with:
                  script: |
                      if (context.eventName !== 'pull_request' && context.eventName !== 'push') {
                        core.setOutput('docs_only', 'false');
                        return;
                      }

                      const docsOnlyPatterns = [
                        /^docs\//,
                        /^[^/]+\.md$/,
                        /^COPYING$/,
                        /^\.github\/ISSUE_TEMPLATE\//,
                        /^\.github\/dependabot\.yml$/,
                        /^\.github\/labeler\.yml$/,
                        /^\.github\/labels\.yml$/,
                        /^\.github\/pull_request_template\.md$/,
                        /^CLAUDE\.md$/,
                        /^CODE_OF_CONDUCT\.md$/,
                        /^CONTRIBUTING\.md$/,
                        /^README\.en\.md$/,
                        /^README\.md$/,
                        /^SECURITY\.md$/,
                        /^SUPPORT\.md$/,
                      ];

                      let files = [];

                      if (context.eventName === 'pull_request') {
                        files = await github.paginate(github.rest.pulls.listFiles, {
                          ...context.repo,
                          pull_number: context.issue.number,
                          per_page: 100,
                        });
                      } else if (context.eventName === 'push') {
                        const before = context.payload.before;
                        const after = context.payload.after;

                        if (!before || !after || /^0+$/.test(before)) {
                          core.setOutput('docs_only', 'false');
                          return;
                        }

                        const comparison = await github.rest.repos.compareCommits({
                          ...context.repo,
                          base: before,
                          head: after,
                        });

                        files = comparison.data.files ?? [];

                        if (files.length >= 300) {
                          core.setOutput('docs_only', 'false');
                          return;
                        }
                      }

                      const docsOnly =
                        files.length > 0 &&
                        files.every((file) => docsOnlyPatterns.some((pattern) => pattern.test(file.filename)));

                      core.setOutput('docs_only', docsOnly ? 'true' : 'false');

            - name: Report classification
              run: echo "docs_only=${{ steps.classify.outputs.docs_only }}"

    conventional-commits:
        name: Conventional Commits
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate pull request title
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
              run: |
                  printf '%s\n' "$PR_TITLE" | pnpm exec commitlint --verbose

            - name: Validate commit messages
              run: |
                  pnpm exec commitlint \
                    --from "${{ github.event.pull_request.base.sha }}" \
                    --to "${{ github.event.pull_request.head.sha }}" \
                    --verbose

    dependency-review:
        name: Dependency Review
        if: github.event_name == 'pull_request'
        needs: changes
        runs-on: ubuntu-latest
        steps:
            - name: Skip dependency review for docs-only PRs
              if: needs.changes.outputs.docs_only == 'true'
              run: echo 'Dependency review is not required for docs-only pull requests.'

            - name: Dependency review
              if: needs.changes.outputs.docs_only != 'true'
              uses: actions/dependency-review-action@v5

    frontend-quality:
        name: Frontend Quality
        needs: changes
        runs-on: ubuntu-latest
        steps:
            - name: Skip frontend quality checks for docs-only PRs
              if: needs.changes.outputs.docs_only == 'true'
              run: echo 'Frontend quality checks are skipped for docs-only changes.'

            - uses: actions/checkout@v6
              if: needs.changes.outputs.docs_only != 'true'

            - uses: pnpm/action-setup@v6
              if: needs.changes.outputs.docs_only != 'true'

            - uses: actions/setup-node@v6
              if: needs.changes.outputs.docs_only != 'true'
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm install --frozen-lockfile

            - name: Type check
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm type:check

            - name: Type check tests
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm test:typecheck

            - name: Lint
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm lint:check

            - name: Format check
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm format:check

    frontend-tests:
        name: Frontend Tests
        needs: changes
        runs-on: ubuntu-latest
        steps:
            - name: Skip frontend tests for docs-only PRs
              if: needs.changes.outputs.docs_only == 'true'
              run: echo 'Frontend tests are skipped for docs-only changes.'

            - uses: actions/checkout@v4
              if: needs.changes.outputs.docs_only != 'true'

            - uses: pnpm/action-setup@v6
              if: needs.changes.outputs.docs_only != 'true'

            - uses: actions/setup-node@v6
              if: needs.changes.outputs.docs_only != 'true'
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm install --frozen-lockfile

            - name: Run frontend tests with coverage
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm test:coverage

            - name: Summarize coverage
              if: needs.changes.outputs.docs_only != 'true'
              run: |
                  node -e "const fs = require('node:fs'); const summary = JSON.parse(fs.readFileSync('.coverage/unit/coverage-summary.json', 'utf8')).total; fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, ['## Frontend Coverage', '', '| Metric | Percent |', '| --- | ---: |', `| Statements | ${summary.statements.pct}% |`, `| Branches | ${summary.branches.pct}% |`, `| Functions | ${summary.functions.pct}% |`, `| Lines | ${summary.lines.pct}% |`, ''].join('\n'))"

            - name: Upload coverage artifact
              if: needs.changes.outputs.docs_only != 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-coverage-report
                  path: .coverage/unit
                  if-no-files-found: error

    rust-checks:
        name: Rust Checks
        needs: changes
        runs-on: ubuntu-latest
        steps:
            - name: Skip Rust checks for docs-only PRs
              if: needs.changes.outputs.docs_only == 'true'
              run: echo 'Rust checks are skipped for docs-only changes.'

            - uses: actions/checkout@v4
              if: needs.changes.outputs.docs_only != 'true'

            - uses: pnpm/action-setup@v6
              if: needs.changes.outputs.docs_only != 'true'

            - uses: actions/setup-node@v6
              if: needs.changes.outputs.docs_only != 'true'
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install Linux system dependencies
              if: needs.changes.outputs.docs_only != 'true'
              run: |
                  sudo apt update
                  sudo apt install -y \
                    build-essential \
                    curl \
                    file \
                    libayatana-appindicator3-dev \
                    libglib2.0-dev \
                    librsvg2-dev \
                    libssl-dev \
                    libwebkit2gtk-4.1-dev \
                    libxdo-dev \
                    pkg-config \
                    wget

            - name: Install Rust stable
              if: needs.changes.outputs.docs_only != 'true'
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              if: needs.changes.outputs.docs_only != 'true'
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Check Rust formatting
              if: needs.changes.outputs.docs_only != 'true'
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

            - name: Check Rust targets
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm check:rust

            - name: Run Rust tests
              if: needs.changes.outputs.docs_only != 'true'
              run: pnpm test:rust

    build-windows:
        name: Build (Windows)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.docs_only != 'true'
        needs:
            - changes
            - frontend-quality
            - frontend-tests
            - rust-checks
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Get short commit SHA
              id: sha
              run: echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Tauri app
              uses: tauri-apps/tauri-action@v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload installers
              uses: actions/upload-artifact@v7.0.1
              with:
                  name: touchai-installers-windows-${{ steps.sha.outputs.short }}
                  path: |
                      src-tauri/target/release/bundle/nsis/*.exe
                      src-tauri/target/release/bundle/msi/*.msi
                  if-no-files-found: warn

            - name: Upload portable
              uses: actions/upload-artifact@v7.0.1
              with:
                  name: touchai-portable-windows-${{ steps.sha.outputs.short }}
                  path: src-tauri/target/release/TouchAI.exe
                  if-no-files-found: warn
