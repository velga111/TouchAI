version: 2
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
      groups:
          frontend-dependencies:
              patterns:
                  - '*'

    - package-ecosystem: 'cargo'
      directory: '/apps/desktop/src-tauri'
      schedule:
          interval: 'weekly'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
